<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Peta COD - Indramayu Club</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body { height: 100%; margin: 0; padding: 0; overscroll-behavior: none; }
    * { box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background-color: #121212; color: #e0e0e0; display: flex; flex-direction: column; }

    .header { text-align: center; padding: 10px 10px 6px; }
    .header h1 { color: #ffd700; font-size: 18px; margin-bottom: 3px; }
    .header p { color: #a0a0a0; font-size: 12px; }

    .panel { padding: 8px 10px; background: #1e1e1e; border-top: 1px solid #333; border-bottom: 1px solid #333; }
    .panel-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .btn { flex: 1; min-width: 110px; padding: 10px 8px; border: none; border-radius: 8px; font-weight: bold; font-size: 12px; cursor: pointer; }
    .btn-gps { background: #ffd700; color: #000; }
    .btn-wa { background: #25D366; color: #000; }
    .btn-reset { background: #444; color: #fff; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .info-box { background: #161616; border: 1px dashed #444; border-radius: 8px; padding: 8px; font-size: 12px; color: #ccc; line-height: 1.5; max-height: 90px; overflow-y: auto; }
    .info-box b { color: #ffd700; }
    .status { font-size: 11px; color: #a0a0a0; margin-top: 5px; }

    #map { flex: 1; width: 100%; }
    .leaflet-popup-content-wrapper { background: #1e1e1e; color: #fff; border-radius: 8px; border: 1px solid #ffd700; }
    .leaflet-popup-tip { background: #1e1e1e; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🗺️ Peta COD - Uji Coba 3 Titik Bebas</h1>
    <p>Tap di peta / pakai GPS untuk pilih sampai 3 titik</p>
  </div>

  <div class="panel">
    <div class="panel-row">
      <button class="btn btn-gps" id="btnGps" onclick="tambahTitikGPS()">📍 Tambah Titik (GPS Saya)</button>
      <button class="btn btn-reset" onclick="resetTitik()">🔄 Reset</button>
      <button class="btn btn-wa" id="btnWa" onclick="bukaRuteWA()" disabled>🟢 Kirim Rute ke WhatsApp</button>
    </div>
    <div class="info-box" id="infoBox">Belum ada titik dipilih. Maksimal 3 titik.</div>
    <div class="status" id="statusText">Tap langsung di peta untuk menambah titik juga bisa.</div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map', { zoomControl: true }).setView([-6.3262, 108.3200], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap'
    }).addTo(map);

    const warnaTitik = ['#ffd700', '#25D366', '#00bfff'];
    let titikList = []; // { lat, lng, marker }

    function renderInfo() {
      const box = document.getElementById('infoBox');
      if (titikList.length === 0) {
        box.textContent = "Belum ada titik dipilih. Maksimal 3 titik.";
      } else {
        box.innerHTML = titikList.map((t, i) =>
          `<div><b>Titik ${i + 1}:</b> ${t.lat.toFixed(5)}, ${t.lng.toFixed(5)}</div>`
        ).join('');
      }
      document.getElementById('btnWa').disabled = titikList.length < 2;
      document.getElementById('btnGps').disabled = titikList.length >= 3;
    }

    function tambahTitik(lat, lng) {
      if (titikList.length >= 3) {
        document.getElementById('statusText').textContent = "⚠️ Sudah 3 titik. Tekan Reset dulu untuk mengulang.";
        return;
      }
      const idx = titikList.length;
      const icon = L.divIcon({
        className: '',
        html: `<div style="background:${warnaTitik[idx]};width:22px;height:22px;border-radius:50%;border:2px solid #000;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;color:#000;">${idx + 1}</div>`,
        iconSize: [22, 22]
      });
      const marker = L.marker([lat, lng], { icon }).addTo(map).bindPopup(`Titik ${idx + 1}`);
      titikList.push({ lat, lng, marker });
      gambarGaris();
      renderInfo();
    }

    let garisList = [];
    function gambarGaris() {
      garisList.forEach(g => map.removeLayer(g));
      garisList = [];
      for (let i = 0; i < titikList.length - 1; i++) {
        const g = L.polyline(
          [[titikList[i].lat, titikList[i].lng], [titikList[i+1].lat, titikList[i+1].lng]],
          { color: '#ffd700', weight: 3, dashArray: '6,6' }
        ).addTo(map);
        garisList.push(g);
      }
      if (titikList.length > 1) {
        const bounds = L.latLngBounds(titikList.map(t => [t.lat, t.lng]));
        map.fitBounds(bounds, { padding: [40, 40] });
      }
    }

    function tambahTitikGPS() {
      const status = document.getElementById('statusText');
      if (!navigator.geolocation) {
        status.textContent = "❌ HP/browser tidak mendukung GPS.";
        return;
      }
      status.textContent = "⏳ Mengambil lokasi...";
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          tambahTitik(pos.coords.latitude, pos.coords.longitude);
          status.textContent = "✅ Titik dari GPS ditambahkan.";
        },
        (err) => { status.textContent = "❌ Gagal ambil lokasi: " + err.message; },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    map.on('click', function(e) {
      tambahTitik(e.latlng.lat, e.latlng.lng);
    });

    function resetTitik() {
      titikList.forEach(t => map.removeLayer(t.marker));
      garisList.forEach(g => map.removeLayer(g));
      titikList = [];
      garisList = [];
      renderInfo();
      document.getElementById('statusText').textContent = "🔄 Titik direset, silakan pilih ulang.";
    }

    function bukaRuteWA() {
      if (titikList.length < 2) return;
      const asal = titikList[0];
      const tujuan = titikList[titikList.length - 1];
      let waypoints = '';
      if (titikList.length === 3) {
        const tengah = titikList[1];
        waypoints = `&waypoints=${tengah.lat},${tengah.lng}`;
      }
      const rute = `https://www.google.com/maps/dir/?api=1&origin=${asal.lat},${asal.lng}&destination=${tujuan.lat},${tujuan.lng}${waypoints}&travelmode=walking`;
      const pesan = `Halo, ini rute COD (${titikList.length} titik):\n${rute}\n\nSilakan ikuti arah di Google Maps ya 🚶`;
      const waUrl = `https://wa.me/?text=${encodeURIComponent(pesan)}`;
      window.open(waUrl, '_blank');
    }

    renderInfo();
  </script>

<script src="nav_alwi.js"></script>

</body>
</html>
