<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peta Interaktif - Indramayu Club</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body { background-color: #121212; color: #e0e0e0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .header { text-align: center; margin-bottom: 20px; }
    .header h1 { color: #ffd700; font-size: 24px; margin-bottom: 8px; }
    .header p { color: #a0a0a0; font-size: 14px; }
    #map { width: 100%; max-width: 800px; height: 450px; border-radius: 12px; border: 2px solid #333; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5); }
    .leaflet-popup-content-wrapper { background: #1e1e1e; color: #fff; border-radius: 8px; border: 1px solid #ffd700; }
    .leaflet-popup-tip { background: #1e1e1e; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🗺️ Peta Interaktif Indramayu</h1>
    <p>Navigasi lokasi dan titik penting Indramayu Club</p>
  </div>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([-6.3262, 108.3200], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap'
    }).addTo(map);
    const marker = L.marker([-6.3262, 108.3200]).addTo(map);
    marker.bindPopup(`
      <div style="text-align: center; padding: 5px;">
        <h3 style="color: #ffd700; margin-bottom: 5px;">Pusat Indramayu</h3>
        <p style="font-size: 12px;">Indramayu Club Base</p>
      </div>
    `).openPopup();
  </script>
<script src="nav_alwi.js"></script>


</body>
</html>
